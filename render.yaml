services:
  - type: web
    name: macrotrack-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard (Neon connection string)
      - key: GEMINI_API_KEY
        sync: false          # set in Render dashboard – enables AI food lookup via Gemini 2.5 Flash Lite
